services:
  n8n:
    image: n8nio/n8n
    container_name: jm-studio-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - jm-network

  jm-studio:
    image: jm-studio:latest
    container_name: jm-studio-web
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - jm-network

volumes:
  n8n_data:

networks:
  jm-network:
    driver: bridge
